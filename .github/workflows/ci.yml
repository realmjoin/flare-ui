name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore Flare.sln

      - run: dotnet build Flare.sln -c Release --no-restore

      - run: dotnet pack src/Flare/Flare.csproj -c Release --no-build -o ./nupkg

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg
